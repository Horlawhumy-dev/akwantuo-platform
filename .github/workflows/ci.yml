name: CI

on:
  push:
    branches: [main]

jobs:

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      # - name: TypeScript check
      #   run: npx tsc --noEmit

      # - name: Lint
      #   run: npm run lint --if-present

      # - name: Run tests
      #   run: npm run test --if-present

      # - name: Build frontend
      #   run: npm run build


  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: akwantuo
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/akwantuo
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # - name: Format check
      #   run: black --check .

      # - name: Import sorting check
      #   run: isort --check-only .

      # - name: Lint
      #   run: flake8 .

      # - name: Run tests
      #   run: pytest
